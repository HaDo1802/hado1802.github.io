            alt=""

            loading="eager"
            decoding="async"
          >
        </a>
        <nav class="nav-center" aria-label="Section navigation">
          <a href="{{ home_url }}#about">About</a>
          <a href="{{ home_url }}#experience">Experience</a>
          <a href="{{ home_url }}#projects">Projects</a>
          <a href="{{ home_url }}#certificates">Certificates</a>
          <a href="{{ home_url }}#contact">Contact</a>

        </nav>
        <div class="header-actions">
          <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
            <span class="menu-text">Menu</span>
            <span class="menu-icon" aria-hidden="true"></span>
          </button>
        </div>
        <nav id="site-menu" class="nav-menu" aria-label="Primary">
          <a href="{{ home_url }}#about">About</a>
          <a href="{{ home_url }}#experience">Experience</a>
          <a href="{{ home_url }}#projects">Projects</a>
          <a href="{{ home_url }}#certificates">Certificates</a>

    </header>
    <main class="content">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>© {{ site.time | date: '%Y' }} {{ site.author }}</p>
    </footer>
    <button class="back-to-top" type="button" aria-label="Back to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
    <script>
      // Smooth scroll
      document.querySelectorAll('a[href*="#"]').forEach(a => {
        a.addEventListener('click', e => {
          const href = a.getAttribute('href');
          if (!href || href === '#') return;
          const url = new URL(href, window.location.origin);
          if (url.pathname !== window.location.pathname || !url.hash) return;
          const target = document.querySelector(url.hash);
          if (!target) return;
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
        });
      });
      // Menu toggle
      (function () {
        var toggle = document.querySelector('.menu-toggle');
        var menu = document.querySelector('.nav-menu');
        if (!toggle || !menu) return;
        function closeMenu() {
          menu.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
          document.body.classList.remove('menu-open');
        }
        toggle.addEventListener('click', function () {
          var isOpen = menu.classList.toggle('open');
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          document.body.classList.toggle('menu-open', isOpen);
        });
        menu.querySelectorAll('a').forEach(function (link) {
          link.addEventListener('click', closeMenu);
        });
        document.addEventListener('click', function (e) {
          if (menu.contains(e.target) || toggle.contains(e.target)) return;
          closeMenu();
        });
      })();
      // Back to top
      (function () {
        var btn = document.querySelector('.back-to-top');
        if (!btn) return;
        function update() {
          btn.classList.toggle('show', window.scrollY > 500);
        }
        btn.addEventListener('click', function () {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        window.addEventListener('scroll', update, { passive: true });
        update();
      })();
      // My Works filter
      (function () {
        var filterButtons = document.querySelectorAll('[data-filter-btn]');
        var cards = document.querySelectorAll('[data-work-card]');
        if (!filterButtons.length || !cards.length) return;
        function applyFilter(category) {
          cards.forEach(function (card) {
            var raw = card.getAttribute('data-category') || '';
            var cats = raw.split(/\s+/).filter(Boolean);
            var shouldShow = category === 'all' || cats.indexOf(category) !== -1;
            card.classList.toggle('is-hidden', !shouldShow);
          });
        }
        filterButtons.forEach(function (button) {
          button.addEventListener('click', function () {
            var filter = button.getAttribute('data-filter') || 'all';
            filterButtons.forEach(function (btn) {
              btn.classList.toggle('is-active', btn === button);
            });
            applyFilter(filter);
          });
        });
        applyFilter('all');
      })();
      // Experience timeline — scroll reveal (respects reduced motion)
      (function () {
        var rows = document.querySelectorAll('.js-exp-reveal');
        if (!rows.length) return;
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          rows.forEach(function (el) {
            el.classList.add('is-revealed');
          });
          return;
        }
        rows.forEach(function (el) {
          el.classList.add('exp-reveal-pending');
        });
        var io = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (en) {
              if (!en.isIntersecting) return;
              en.target.classList.add('is-revealed');
              en.target.classList.remove('exp-reveal-pending');
              io.unobserve(en.target);
            });
          },
          { root: null, rootMargin: '0px 0px -5% 0px', threshold: 0.06 }
        );
        rows.forEach(function (el) {
          io.observe(el);
        });
      })();
      // Preview swap on hover if data-preview exists
      document.addEventListener('mouseover', function(e){
        const img = e.target.closest('img[data-preview]');
        if(!img) return;
        img.dataset.still = img.dataset.still || img.src;
        img.src = img.getAttribute('data-preview');
      });
      document.addEventListener('mouseout', function(e){
        const img = e.target.closest('img[data-preview]');
        if(!img || !img.dataset.still) return;
        img.src = img.dataset.still;
      });
      // Simple lightbox
      const lb = document.createElement('div');
      lb.className = 'lightbox hidden';
      lb.innerHTML = '<div class="lb-backdrop"></div><img class="lb-img" alt=""><button class="lb-close" aria-label="Close">×</button>';
      document.body.appendChild(lb);
      const lbImg = lb.querySelector('.lb-img');
      const close = () => lb.classList.add('hidden');
      lb.querySelector('.lb-backdrop').addEventListener('click', close);
      lb.querySelector('.lb-close').addEventListener('click', close);
      document.addEventListener('click', function(e){
        const a = e.target.closest('[data-lightbox-src]');
        if(!a) return;
        e.preventDefault();
        lbImg.src = a.getAttribute('data-lightbox-src');
        lb.classList.remove('hidden');
      });
    </script>
  </body>
</html>
